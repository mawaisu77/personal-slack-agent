# T-052 — extend with image registry auth, env secrets, and rollout targets.
name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — wire registry in your repo)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: personal-ai-assistant:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
