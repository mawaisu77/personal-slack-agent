# T-052 — local stack; mount secrets via env_file in production.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/personal_ai
      REDIS_URL: redis://redis:6379/0
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-dev-signing-secret}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-xoxb-dev-token}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
